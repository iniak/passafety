name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows (x64)
    runs-on: windows-latest
    permissions:
      contents: write   # needed to create release + upload assets

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app + create release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Passafety ${{ github.ref_name }}'
          releaseBody: |
            See [README](https://github.com/iniak/passafety/blob/main/README.md) for full documentation.

            ### Downloads
            - **`passafety.exe`** — portable green build, double-click to run, `vault.db` is created next to the exe
            - **`Passafety_*_x64-setup.exe`** — NSIS installer

            ### System requirements
            - Windows 10 / 11 (x64)
            - WebView2 Runtime (bundled with modern Windows)
          releaseDraft: true   # set to false once you're happy with the auto-generated release flow
          prerelease: false
